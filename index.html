<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilupul's Tech Startup</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #0f172a; /* Modern dark background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 85%;
            max-width: 450px;
        }
        /* උඩින් තියෙන පොඩි Badge එක */
        .badge {
            display: inline-block;
            background: rgba(0, 210, 255, 0.1);
            color: #00d2ff;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 210, 255, 0.3);
        }
        .greeting {
            font-size: 20px;
            color: #94a3b8;
            margin-bottom: 5px;
        }
        h1 {
            margin: 0 0 15px 0;
            font-size: 32px;
            line-height: 1.3;
        }
        /* නමට දීලා තියෙන ලස්සන Gradient Effect එක */
        .name-highlight {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        p {
            margin: 0;
            font-size: 15px;
            color: #cbd5e1;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Tech Startup</div>
        
        <div class="greeting">Hello,</div>
        <h1>I'm <span class="name-highlight">Nilupul Hettiarachchi</span></h1>
        
        <p>Welcome to <strong>Nilupul.xyz</strong><br>Innovation starts here. We are building the future of tech.</p>
    </div>
</body>
</html>
