<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nilupul Hettiarachchi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f9f9f6; /* Off-white / Cream background */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #1a1a1a;
        }
        .container {
            width: 85%;
            max-width: 600px;
            text-align: left; /* වම් පසට පෙළගස්වා ඇත */
            padding: 20px;
        }
        .intro {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #1a1a1a;
        }
        .name {
            font-size: 65px;
            font-weight: 800;
            line-height: 1.05;
            margin-bottom: 30px;
            letter-spacing: -1.5px;
        }
        .subtitle {
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }
        .description {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
            line-height: 1.5;
        }
        
        /* ෆෝන් එකෙන් බලද්දී අකුරු ගැලපෙන සයිස් එකට හැදීම */
        @media (max-width: 600px) {
            .name {
                font-size: 50px;
            }
            .intro {
                font-size: 24px;
            }
            .subtitle {
                font-size: 16px;
                margin-bottom: 35px;
            }
            .description {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="intro">I'm</div>
        <div class="name">Nilupul<br>Hettiarachchi</div>
        
        <div class="subtitle">// Welcome to nilupul.xyz</div>
        
        <div class="description">
            Innovation starts here.<br>Building the future of tech.
        </div>
    </div>
</body>
</html>
